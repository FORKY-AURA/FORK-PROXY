<body>

    <div class="container">
        <div id="account-status" style="text-align: center; margin-bottom: 20px; display: none;">
            <div style="background: rgba(30, 30, 30, 0.8); padding: 15px; border-radius: 10px; display: inline-flex; align-items: center; gap: 15px;">

        <h1>The APPS!!!!</h1>

            Total Apps: <span id="gameCount">0</span>

        <div id="gamesContainer"></div>

    <div id="iframeContainer" style="display: none;">
    <div id="iframeControls">
        <button id="fullScreenButton">Full Screen</button>
        <button id="closeButton">X</button>
    </div>
    <div id="loadingIndicator">
        <div class="spinner"></div>
        <div class="loading-text">Loading Game...</div>
    </div>
    <iframe id="gameFrame" src="" frameborder="0" style="width: 100%; height: 100%; display: none;"></iframe>
    <object id="gameObject" type="text/html" style="width: 100%; height: 100%; display: none;" data=""></object>
</div>

    <script>
    document.addEventListener("DOMContentLoaded", function () {
        var games = [];
        const host = window.location.origin;
        var gamesList = [
            { "name": "Other Site", "url": `${host}/old-site/index.html`, "image": "assets/apps/page.png" },
            { "name": "Proxy", "url": `${host}/apps/UBER.html`, "image": "assets/apps/prox.png" },
            { "name": "Ruffle Emulator", "url": `${host}/apps/ruffle.html`, "image": "assets/apps/ruffle.png" },
            { "name": "ROM Emulator (EmulatorJS)", "url": `${host}/apps/ROM.html`, "image": "assets/apps/emulatorJS.png" },
            { "name": "Music Player", "url": `${host}/apps/music.html`, "image": "assets/apps/music.png" },
            { "name": "DDOS (kinda)", "url": `${host}/apps/dos.html`, "image": "assets/apps/dos.png" },
            { "name": "Hand Tracking", "url": `${host}/apps/hands.html`, "image": "assets/apps/hands.png" },
            { "name": "Behold the Secrets of Hacks", "url": `${host}/apps/H&(k.html`, "image": "assets/apps/hacks.png" },
            { "name": "Pause extensions", "url": `${host}/apps/hang3r.html`, "image": "assets/apps/hang3r.png" },
            { "name": "Qwen Gpt \"Better than deepseek and chatGPT\"", "url": `${host}/apps/Qwen.html`, "image": "assets/apps/qwen.png" },
            { "name": "Kahoot Flooder", "url": `${host}/apps/kahoot-flooder.html`, "image": "assets/apps/flooder.png" },
        //*    { "name": "Rafa ONLY", "url": `${host}/a/hvtrs8%2F-wuw%2Cpmrlhwb%2Ccmm-`, "image": "assets/apps/taco.png" },
            { "name": "Now.gg", "url": `${host}/a/hvtrs8%2F-nmw%2Cge`, "image": "assets/apps/nowgg.png" },
            { "name": "Chat GPT", "url": `${host}/a/hvtrs8%2F-cjavgrt%2Ccmm`, "image": "assets/apps/chatgpt.png"},
            { "name": "Discord", "url": `${host}/a/hvtrs8%2F-dksaopd%2Ccmm`, "image": "assets/apps/discord.png"},
            { "name": "Mobile Phone", "url": `${host}/apps/phone.html`, "image": "assets/apps/phone.png"},
            { "name": "Proxy V2", "url": `/rx`, "image": "assets/apps/prox.png", "tab-open": true }
        ];
        games = gamesList;

        var container = document.getElementById("gamesContainer");
        var iframeContainer = document.getElementById("iframeContainer");
        var gameFrame = document.getElementById("gameFrame");
        var gameObject = document.getElementById("gameObject");
        var loadingIndicator = document.getElementById("loadingIndicator");
        var fullScreenButton = document.getElementById("fullScreenButton");
        var closeButton = document.getElementById("closeButton");

        function displayGames(filteredGames) {
            container.innerHTML = "";
            filteredGames.forEach(function (game) {
                var button = document.createElement("button");
                button.className = "button";

                var img = document.createElement("img");
                img.src = game.image;
                img.alt = game.name;
                button.appendChild(img);

                var title = document.createElement("div");
                title.className = "game-title";
                title.textContent = game.name;
                button.appendChild(title);

                button.onclick = function () {
                    const hasLineReference = game.url.includes('#L');
                    if (game["tab-open"] === true) {
                        // Open the game in a new tab
                        let newTab = window.open("about:blank", "_blank");
                        if (newTab) {
                            newTab.document.write(`
                                <!DOCTYPE html>
                                <html lang="en">
                                <head>
                                    <title>${game.name}</title>
                                    <style>
                                        body { margin: 0; overflow: hidden; background: #000; }
                                        iframe { width: 100vw; height: 100vh; border: none; }
                                    </style>
                                </head>
                                <body>
                                    <iframe src="${game.url}" frameborder="0"></iframe>
                                </body>
                                </html>
                            `);
                            newTab.document.close();
                        }
                    } else if (hasLineReference) {
                        // Directly use iframe for URLs with line references
                        document.querySelectorAll(".button").forEach(element => (element.style.display = "none"));
                        iframeContainer.style.display = "flex";
                        loadingIndicator.style.display = "flex";
                        gameFrame.style.display = "block";
                        gameObject.style.display = "none";
                        gameFrame.src = game.url;
                        gameFrame.onload = function() {
                            loadingIndicator.style.display = "none";
                        };
                    } else {
                        // Show the game in the iframe with object fallback
                        document.querySelectorAll(".button").forEach(element => (element.style.display = "none"));
                        iframeContainer.style.display = "flex";
                        loadingIndicator.style.display = "flex";
                        
                        // First try with object element
                        gameObject.style.display = "block";
                        gameFrame.style.display = "none";
                        gameObject.data = game.url;

                        gameObject.onload = function() {
                            loadingIndicator.style.display = "none";
                        };

                        gameObject.onerror = function() {
                            // Fallback to iframe if the object can't load
                            gameObject.style.display = "none";
                            gameFrame.style.display = "block";
                            gameFrame.src = game.url;
                            
                            gameFrame.onload = function() {
                                loadingIndicator.style.display = "none";
                            };
                        };
                    }
                };

                container.appendChild(button);
            });
        }

        // Initial display of all games
        displayGames(games);
        document.getElementById("gameCount").textContent = games.length;

        fullScreenButton.addEventListener("click", function () {
            const elementToFullscreen = gameFrame.style.display === "block" ? gameFrame : gameObject;
            
            if (elementToFullscreen.requestFullscreen) {
                elementToFullscreen.requestFullscreen();
            } else if (elementToFullscreen.mozRequestFullScreen) {
                elementToFullscreen.mozRequestFullScreen();
            } else if (elementToFullscreen.webkitRequestFullscreen) {
                elementToFullscreen.webkitRequestFullscreen();
            } else if (elementToFullscreen.msRequestFullscreen) {
                elementToFullscreen.msRequestFullscreen();
            }
        });

        closeButton.addEventListener("click", function () {
            iframeContainer.style.display = "none";
            gameObject.data = "";
            gameFrame.src = "";
            document.querySelectorAll(".button").forEach(element => (element.style.display = "inline-block"));
        });

        document.getElementById("searchInput").addEventListener("input", function (event) {
            var searchTerm = event.target.value.toLowerCase();
            var filteredGames = games.filter(function (game) {
                return game.name.toLowerCase().includes(searchTerm);
            });
            displayGames(filteredGames);
        });

        
        // Apply saved settings
        const applySettings = () => {
            const settings = JSON.parse(localStorage.getItem('siteSettings') || '{}');
            
            // Set default title if no settings exist
            document.title = settings.pageTitle || 'Google';
            
            // Set default favicon if no settings exist
            const faviconPath = settings.cloakPreset ? {
                'google': 'assets/favicon/google.ico',
                'drive': 'assets/favicon/drive.ico',
                'classroom': 'assets/favicon/classroom.ico',
                'canvas': 'assets/favicon/canvas.ico'
            }[settings.cloakPreset] : 'assets/favicon/google.ico';

            const links = document.querySelectorAll('link[rel="icon"]');
            links.forEach(link => link.remove());
            const newLink = document.createElement('link');
            newLink.rel = 'icon';
            newLink.href = faviconPath;
            document.head.appendChild(newLink);
        };
        
        // Initialize when page loads
        applySettings();
    });
    </script>
    <script>
document.addEventListener("DOMContentLoaded", () => {
  const buttons = document.querySelectorAll("#gamesContainer .button");
  const delayIncrement = 0.05; // seconds

  buttons.forEach((button, index) => {
    const delay = (index + 1) * delayIncrement;
    button.style.animationDelay = `${delay}s`;
  });
});
</script>

</body>
