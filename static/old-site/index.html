    <script>
        function redirect(url) {

        const updateButton = document.getElementById('update-button');
        updateButton.addEventListener('click', updateSite);
        function updateSite() {
            localStorage.clear();
            deleteCookies();
            window.location.reload(true);
        }
        function deleteCookies() {
            const cookies = document.cookie.split(';');
            for (const cookie of cookies) {
                const cookieName = cookie.trim().split('=')[0];
                document.cookie = `${cookieName}=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/`;
            }
        }

    <canvas id="particles" style="position: fixed; top: 0; left: 0; z-index: -1;"></canvas>

    <script>
        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const particles = [];

        function createParticle() {
            return {
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 3 + 1,
                speed: Math.random() * 1,
                direction: Math.random() * 360,
            };
        }

        function drawParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach((particle, index) => {
                ctx.beginPath();
                ctx.arc(particle.x, particle.y, particle.size, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
                ctx.fill();
                particle.y -= particle.speed;

                if (particle.y < 0) {
                    particles[index] = createParticle();
                }
            });
        }

        for (let i = 0; i < 100; i++) {
            particles.push(createParticle());
        }

        setInterval(drawParticles, 30);

        window.onresize = function() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        };
        
        //Online Counter

    // Update the count every 1 second
    setInterval(updateOnlineCount, 1000);
    updateOnlineCount();

    // Function to format numbers with commas
    function formatNumberWithCommas(number) {
        return number.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
    }

    // Function to fetch and update the total visits
    async function updateTotalVisits() {
        try {
            const response = await fetch('../total_visits.php');
            const visits = await response.text();
            document.getElementById('total-visits').innerText = formatNumberWithCommas(visits);
        } catch (error) {
            console.error('Error fetching total visits:', error);
        }
    }

    // Initial fetch
    updateTotalVisits();

    // Periodically fetch updates (every 2 seconds)
    setInterval(updateTotalVisits, 2000);
