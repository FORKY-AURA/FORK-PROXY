<script>
// Get the update button element
const updateButton = document.getElementById('update-button');

// Add an event listener to the button
updateButton.addEventListener('click', updateSite);

// Function to update the site
function updateSite() {
  // Delete local storage data
  localStorage.clear();

  // Delete cookies
  deleteCookies();

  // Refresh the page to reload all content
  window.location.reload(true); // true forces a reload from the server
}

// Function to delete cookies
function deleteCookies() {
  const cookies = document.cookie.split(';');

  for (const cookie of cookies) {
    const cookieName = cookie.trim().split('=')[0];
    // Set the cookie's expiration date to the past to delete it
    document.cookie = `${cookieName}=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/`;
  }
}
</script>
<canvas id="particles" style="position: fixed; top: 0; left: 0; z-index: -1;"></canvas>

<script>
    const canvas = document.getElementById('particles');
    const ctx = canvas.getContext('2d');

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const particles = [];

    function createParticle() {
        return {
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            size: Math.random() * 3 + 1,
            speed: Math.random() * 1,
            direction: Math.random() * 360,
        };
    }

    function drawParticles() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        particles.forEach((particle, index) => {
            ctx.beginPath();
            ctx.arc(particle.x, particle.y, particle.size, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
            ctx.fill();
            particle.y -= particle.speed;

            if (particle.y < 0) {
                particles[index] = createParticle();
            }
        });
    }

    for (let i = 0; i < 100; i++) {
        particles.push(createParticle());
    }

    setInterval(drawParticles, 30);

    window.onresize = function() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    };
    // them selector
     // Function to apply a theme
    function applyTheme(theme) {
        const stylesheet = document.querySelector('link[rel="stylesheet"]');
        if (stylesheet) {
            stylesheet.href = theme;
            localStorage.setItem('selectedTheme', theme); // Save to local storage
        }
    }

    // Initialize theme selector
    document.addEventListener('DOMContentLoaded', () => {
        const themeSelector = document.getElementById('theme-selector');
        const savedTheme = localStorage.getItem('selectedTheme') || 'css/style.css'; // Default to style.css

        // Apply the saved theme
        applyTheme(savedTheme);

        // Set the dropdown to the saved theme
        themeSelector.value = savedTheme;

        // Handle theme changes
        themeSelector.addEventListener('change', (event) => {
            applyTheme(event.target.value);
        });
    });
</script>
