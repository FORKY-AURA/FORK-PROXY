<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        
        <title>InterStellar</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                background: linear-gradient(135deg, #3a3d44, #0e0e14);
                color: #fff;
                font-family: 'Arial', sans-serif;
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                min-height: 100vh;
                text-align: center;
                padding: 20px;
            }

            h1 {
                font-size: 3rem;
                font-weight: bold;
                letter-spacing: 2px;
                color: #0fc0fc;
                text-shadow: 2px 2px 8px rgba(0, 255, 255, 0.8);
                margin-bottom: 20px;
            }

            h1 strong {
                color: #ff007f;
                text-shadow: 2px 2px 8px rgba(255, 0, 127, 0.8);
            }

            h2 {
                font-size: 2rem;
                color: #ff0;
                margin-bottom: 10px;
            }

            h3 {
                font-size: 1.3rem;
                font-weight: 300;
                color: #dcdcdc;
                margin-bottom: 15px;
                line-height: 1.5;
            }

            a {
    font-size: 1.5rem;
    text-decoration: none;
    color: #0fc0fc;
    padding: 15px 30px;
    background: linear-gradient(45deg, #ff007f, #0fc0fc);
    border-radius: 50px;
    border: 2px solid transparent;
    transition: background 0.6s ease, transform 0.4s ease, box-shadow 0.4s ease, filter 0.6s ease;
    box-shadow: 0 4px 15px rgba(0, 255, 255, 0.4);
}

a:hover {
    background: linear-gradient(45deg, #0fc0fc, #ff007f);
    transform: scale(1.1);
    box-shadow: 0 6px 20px rgba(0, 255, 255, 0.6);
    filter: invert(1);
}

            a:focus, a:active {
                transform: scale(1.05);
                box-shadow: 0 6px 20px rgba(255, 0, 127, 0.7);
            }

            h2, h3 {
                animation: fadeInUp 1s ease-out forwards;
            }

            h1 {
                animation: fadeIn 1s ease-out forwards;
            }

            @keyframes fadeIn {
                from {
                    opacity: 0;
                    transform: translateY(-20px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }

            @keyframes fadeInUp {
                from {
                    opacity: 0;
                    transform: translateY(20px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }
        </style>
    </head>
    <body>
        <h1>InterStellar <strong>Read Directions!</strong></h1>
        <h2>Directions:</h2>
        <h3>When you open the InterStellar Proxie, please allow it to open other links/tabs. It will be located next to the bookmark button. <strong>This will help it not get blocked.</strong></h3>
        <a href="https://math-is-fun-26eyhr3.koyeb.app/" target="_blank">InterStellar Proxie</a>
    </body>
</html>
