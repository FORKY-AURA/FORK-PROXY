<canvas id="particles" style="position: fixed; top: 0; left: 0; z-index: -1;"></canvas>
<script>const canvas = document.getElementById('particles');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    const particles = [];
    function createParticle() {
        return {
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            size: Math.random() * 3 + 1,
            speed: Math.random() * 1,
            direction: Math.random() * 360,
        };
    }
    function drawParticles() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        particles.forEach((particle, index) => {
            ctx.beginPath();
            ctx.arc(particle.x, particle.y, particle.size, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
            ctx.fill();
            particle.y -= particle.speed;
            if (particle.y < 0) {
                particles[index] = createParticle();
            }
        });
    }
    for (let i = 0; i < 100; i++) {
        particles.push(createParticle());
    }
    setInterval(drawParticles, 30);
    window.onresize = function() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    };
    document.getElementById('search-bar').addEventListener('input', function () {
        const query = this.value.toLowerCase();
        const buttons = document.querySelectorAll('.buttons button');

        buttons.forEach(button => {
            const buttonText = button.textContent.toLowerCase();
            if (buttonText.includes(query)) {
                button.classList.remove('hidden'); // Show matching buttons
            } else {
                button.classList.add('hidden'); // Hide non-matching buttons
            }
        });
    });
    </script>
