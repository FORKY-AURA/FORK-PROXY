<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snow Effect</title>
  <style>
    html, body {
      overflow: hidden;
      margin: 0;
      padding: 0;
    }
    canvas {
      display: block;
      position: fixed;
      top: 0;
      left: 0;
      z-index: -1;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <canvas id="snowCanvas"></canvas>

  <script>
    const canvas = document.getElementById("snowCanvas");
    const ctx = canvas.getContext("2d");

    // Set canvas dimensions to fill the screen
    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener("resize", resizeCanvas);

    // Snowflake class
    class Snowflake {
      constructor() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height - canvas.height;
        this.size = Math.random() * 3 + 1;
        this.speed = Math.random() * 1 + 0.5;
        this.opacity = Math.random() * 0.5 + 0.3;
        this.swing = Math.random() * 3;
        this.swingSpeed = Math.random() * 0.02;
        this.swingAngle = Math.random() * Math.PI * 2;
      }

      fall() {
        this.y += this.speed;
        this.swingAngle += this.swingSpeed;
        this.x += Math.sin(this.swingAngle) * this.swing;
        
        if (this.y > canvas.height) {
          this.y = -10;
          this.x = Math.random() * canvas.width;
        }
      }

      draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
        ctx.fill();
      }
    }

    // Create an array of snowflakes
    const snowflakes = Array.from({ length: 150 }, () => new Snowflake());

    // Animation loop
    function animateSnow() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      snowflakes.forEach(snowflake => {
        snowflake.fall();
        snowflake.draw();
      });
      requestAnimationFrame(animateSnow);
    }

    animateSnow();
  </script>
</body>
</html>
