<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Confetti Effect</title>
  <style>
    html, body {
      overflow: hidden;
      margin: 0;
      padding: 0;
    }
    canvas {
      display: block;
      position: fixed;
      top: 0;
      left: 0;
      z-index: -1;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <canvas id="confettiCanvas"></canvas>

  <script>
    const canvas = document.getElementById("confettiCanvas");
    const ctx = canvas.getContext("2d");

    // Set canvas dimensions to fill the screen
    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener("resize", resizeCanvas);

    // Colors for confetti
    const colors = [
      "#f94144", "#f3722c", "#f8961e", "#f9c74f", 
      "#90be6d", "#43aa8b", "#4d908e", "#577590", 
      "#277da1", "#ff99c8", "#fcf6bd", "#d0f4de"
    ];

    // Confetti piece class
    class ConfettiPiece {
      constructor() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height - canvas.height;
        this.width = Math.random() * 10 + 5;
        this.height = Math.random() * 6 + 3;
        this.speed = Math.random() * 3 + 1;
        this.color = colors[Math.floor(Math.random() * colors.length)];
        this.rotation = Math.random() * 360;
        this.rotationSpeed = (Math.random() - 0.5) * 5;
        this.oscillationSpeed = Math.random() * 0.1 + 0.05;
        this.oscillationDistance = Math.random() * 40 + 20;
        this.angle = Math.random() * Math.PI * 2;
      }

      update() {
        this.y += this.speed;
        this.x += Math.sin(this.angle) * this.oscillationDistance / 10;
        this.angle += this.oscillationSpeed;
        this.rotation += this.rotationSpeed;
        
        if (this.y > canvas.height) {
          this.y = -this.height;
          this.x = Math.random() * canvas.width;
        }
      }

      draw() {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.rotation * Math.PI / 180);
        ctx.fillStyle = this.color;
        ctx.fillRect(-this.width / 2, -this.height / 2, this.width, this.height);
        ctx.restore();
      }
    }

    // Create an array of confetti pieces
    const confettiPieces = Array.from({ length: 100 }, () => new ConfettiPiece());

    // Animation loop
    function animateConfetti() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      confettiPieces.forEach(piece => {
        piece.update();
        piece.draw();
      });
      requestAnimationFrame(animateConfetti);
    }

    animateConfetti();
  </script>
</body>
</html>
