function openGame(url) {
    const iframeContainer = document.getElementById('iframeContainer');
    const loadingIndicator = document.getElementById('loadingIndicator');

    // Remove existing iframe if any
    const existingIframe = document.getElementById('gameIframe');
    if (existingIframe) {
        existingIframe.remove();
    }

    // Create a new iframe
    const iframe = document.createElement('iframe');
    iframe.id = 'gameIframe';
    iframe.src = url;
    iframe.style.width = '100%';
    iframe.style.height = '100%';
    iframe.style.border = 'none';

    // Show loading indicator until iframe is fully loaded
    loadingIndicator.style.display = 'block';
    iframe.onload = function () {
        loadingIndicator.style.display = 'none';
    };

    // Append new iframe and display container
    iframeContainer.appendChild(iframe);
    iframeContainer.style.display = 'flex';
}

function closeGame() {
    const iframeContainer = document.getElementById('iframeContainer');
    const iframe = document.getElementById('gameIframe');

    if (iframe) {
        iframe.remove();
    }

    if (typeof loadingInterval !== 'undefined') {
        clearInterval(loadingInterval);
    }

    iframeContainer.style.display = 'none';
}

// Initialize hamburger menu functionality
function initHamburgerMenu() {
    const hamburgerBtn = document.querySelector('.hamburger-btn');
    const dropdownContent = document.querySelector('.dropdown-content');
    
    // Toggle dropdown menu when clicking the hamburger button
    hamburgerBtn.addEventListener('click', function(event) {
        event.stopPropagation(); // Prevent event from bubbling up
        dropdownContent.classList.toggle('active');
    });
    
    // Keep dropdown open when clicking inside it
    dropdownContent.addEventListener('click', function(event) {
        event.stopPropagation(); // Prevent event from bubbling up
    });
    
    // Close dropdown when clicking outside
    document.addEventListener('click', function() {
        dropdownContent.classList.remove('active');
    });
}

// Apply saved settings
const applySettings = () => {
    const settings = JSON.parse(localStorage.getItem('siteSettings') || '{}');
            
    // Set default title if no settings exist
    document.title = settings.pageTitle || 'Google';
            
    // Set default favicon if no settings exist
    const faviconPath = settings.cloakPreset ? {
        'google': 'assets/favicon/google.ico',
        'drive': 'assets/favicon/drive.ico',
        'classroom': 'assets/favicon/classroom.ico',
        'canvas': 'assets/favicon/canvas.ico'
    }[settings.cloakPreset] : 'assets/favicon/google.ico';

    const links = document.querySelectorAll('link[rel="icon"]');
    links.forEach(link => link.remove());
    const newLink = document.createElement('link');
    newLink.rel = 'icon';
    newLink.href = faviconPath;
    document.head.appendChild(newLink);
};
        
// Apply settings when page loads
document.addEventListener('DOMContentLoaded', applySettings);

<script>
// Function to apply animation delays to buttons
function applyButtonAnimations() {
  const buttons = document.querySelectorAll("#gamesContainer .button");
  const delayIncrement = 0.05; // seconds

  buttons.forEach((button, index) => {
    const delay = (index + 1) * delayIncrement;
    button.style.animationDelay = `${delay}s`;
  });
}

</script>
